<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>My Website</title>
        <link rel="stylesheet" href="./css/style.css" />
        <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    </head>
    <body>
        <main id="gameArea">
            <h1>Welcome to My Website</h1>
            <button id="pauseBtn">Pause</button>
            <button id="resumeBtn" style="display: none">Resume</button>
            <p>Timer: <span id="timerDisplay">00:00.000</span></p>

            <div id="wrapper">
                <button id="gen-sudoku-button">New sudoku</button>
                <div class="sudoku-grid" id="sudoku"></div>
                <table id="sudoku-numpad"></table>
            </div>
        </main>
        <script src="./js/script.js" type="module"></script>
        <script src="./js/sudoku.js" type="module"></script>
        <script src="./js/draw_sudoku.js" type="module"></script>
        <script src="./js/numpad.js" type="module"></script>
        <script src="./js/check-hint.js" type="module"></script>
    </body>
</html>
