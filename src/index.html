<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>My Website</title>
        <link rel="stylesheet" href="./css/style.css" />
        <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    </head>
    
    <body style="background-color: #f7f4f6">

        <!-- SUDOKUEN -->
        <main id="gameArea" class="hidden">
            <h1>SUDOKU</h1>
            <p class="timer">Timer: <span id="timerDisplay">00:00.000</span></p>
            <button class="interactable-btn" id="pauseBtn">Pause</button>
            <button
                class="interactable-btn"
                id="resumeBtn"
                style="display: none"
            >
                Resume
            </button>

            <div id="wrapper">
                <div id="sudoku-section">
                    <button class="interactable-btn" id="gen-sudoku-button">
                        New sudoku
                    </button>
                    <div class="sudoku-grid" id="sudoku"></div>
                </div>

                <div id="numpad-wrap">
                    <table id="sudoku-numpad"></table>
                </div>
            </div>
                <button id="easy" class="difficulty-btn">Easy</button>
                <button id="medium" class="difficulty-btn">Medium</button>
                <button id="hard" class="difficulty-btn">Hard</button>  
              
            </div>
        </main>
        <script src="./js/script.js" type="module"></script>
        <script src="./js/sudoku.js" type="module"></script>
        <script src="./js/draw_sudoku.js" type="module"></script>
        <script src="./js/numpad.js" type="module"></script>
        <script src="./js/check-hint.js" type="module"></script>
        <script src="./js/switch_button.js" type="module"></script>
    </body>
</html>
